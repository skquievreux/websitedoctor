<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Doctor – Vergleich</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #111; font-size: 11pt; line-height: 1.5; }

    .report-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 2px solid #111; }
    .report-header h1 { font-size: 1.4rem; font-weight: 800; }
    .report-header .meta { font-size: 0.8rem; color: #555; margin-top: 0.2rem; }

    .scores-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .score-tile { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 0.8rem 1rem; text-align: center; }
    .score-tile .val { font-size: 2rem; font-weight: 800; }
    .score-tile .lbl { font-size: 0.72rem; color: #777; margin-top: 0.15rem; }
    .score-pos { color: #166534; }
    .score-neg { color: #991b1b; }
    .score-zero { color: #555; }

    .section { margin-bottom: 1.5rem; break-inside: avoid; }
    .section h2 { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: #777; margin-bottom: 0.6rem; border-bottom: 1px solid #eee; padding-bottom: 0.25rem; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .two-col h3 { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.06em; color: #777; margin-bottom: 0.4rem; }

    ul { list-style: none; }
    ul li { padding: 0.2rem 0; font-size: 0.88rem; display: flex; gap: 0.4rem; }
    .dot-green { color: #166534; }
    .dot-red { color: #991b1b; }

    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: #777; padding: 0.3rem 0.5rem; border-bottom: 1px solid #ddd; }
    td { padding: 0.3rem 0.5rem; border-bottom: 1px solid #f0f0f0; vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    .change-pos { color: #166534; font-weight: 700; }
    .change-neg { color: #991b1b; font-weight: 700; }
    .change-zero { color: #555; }

    .report-footer { margin-top: 2rem; padding-top: 0.75rem; border-top: 1px solid #ddd; font-size: 0.72rem; color: #999; text-align: center; }

    .empty-note { font-size: 0.85rem; color: #999; font-style: italic; }

    @media print {
      body { font-size: 10pt; }
      .section { break-inside: avoid; }
    }
  </style>
</head>
<body>
  <div id="content">
    <p style="color:#999;padding:2rem">Lade Vergleich…</p>
  </div>

<script>
  function esc(s) { return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') }
  function sign(n) { return n > 0 ? `+${n}` : `${n}` }
  function changeCls(n) { return n > 0 ? 'change-pos' : n < 0 ? 'change-neg' : 'change-zero' }

  async function load() {
    const parts = location.pathname.split('/')
    const idB = parts.pop()
    const idA = parts.pop()

    const [diffRes, repARes, repBRes] = await Promise.all([
      fetch(`/diff/${idA}/${idB}`),
      fetch(`/report/${idA}`),
      fetch(`/report/${idB}`)
    ])
    if (!diffRes.ok) { document.getElementById('content').textContent = 'Vergleich nicht gefunden.'; return }
    const [diff, repA, repB] = await Promise.all([diffRes.json(), repARes.json(), repBRes.json()])
    render(diff, repA, repB)
  }

  function render(d, repA, repB) {
    const now = new Date().toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
    const dateA = new Date(repA.timestamp).toLocaleDateString('de-DE')
    const dateB = new Date(repB.timestamp).toLocaleDateString('de-DE')

    const header = `<div class="report-header">
      <div>
        <h1>Vergleich: ${esc(repA.siteTitle || repA.hostname || repA.url)}</h1>
        <div class="meta">A: ${esc(d.urlA)} (${dateA}) &nbsp;→&nbsp; B: ${esc(d.urlB)} (${dateB})</div>
        <div class="meta">Erstellt: ${now}</div>
      </div>
    </div>`

    const scoreSection = `<div class="scores-row">
      <div class="score-tile">
        <div class="val ${changeCls(d.scoreChange)}">${sign(d.scoreChange)}</div>
        <div class="lbl">Gesamt-Score</div>
      </div>
      <div class="score-tile">
        <div class="val ${changeCls(d.seoScoreChange)}">${sign(d.seoScoreChange)}</div>
        <div class="lbl">SEO-Score</div>
      </div>
      <div class="score-tile">
        <div class="val">${repA.score}</div>
        <div class="lbl">Score A (${dateA})</div>
      </div>
      <div class="score-tile">
        <div class="val">${repB.score}</div>
        <div class="lbl">Score B (${dateB})</div>
      </div>
    </div>`

    const weakSection = `<div class="section"><h2>Schwächen</h2>
      <div class="two-col">
        <div>
          <h3>Neue Schwächen</h3>
          ${d.newWeaknesses.length
            ? `<ul>${d.newWeaknesses.map(w => `<li><span class="dot-red">✗</span>${esc(w)}</li>`).join('')}</ul>`
            : '<p class="empty-note">Keine neuen Schwächen</p>'}
        </div>
        <div>
          <h3>Behobene Schwächen</h3>
          ${d.resolvedWeaknesses.length
            ? `<ul>${d.resolvedWeaknesses.map(w => `<li><span class="dot-green">✓</span>${esc(w)}</li>`).join('')}</ul>`
            : '<p class="empty-note">Keine behobenen Schwächen</p>'}
        </div>
      </div>
    </div>`

    const pagesSection = `<div class="section"><h2>Seiten</h2>
      <div class="two-col">
        <div>
          <h3>Neue Seiten (${d.newPages.length})</h3>
          ${d.newPages.length
            ? `<ul>${d.newPages.map(u => `<li><span class="dot-green">+</span>${esc(u)}</li>`).join('')}</ul>`
            : '<p class="empty-note">Keine neuen Seiten</p>'}
        </div>
        <div>
          <h3>Entfernte Seiten (${d.removedPages.length})</h3>
          ${d.removedPages.length
            ? `<ul>${d.removedPages.map(u => `<li><span class="dot-red">−</span>${esc(u)}</li>`).join('')}</ul>`
            : '<p class="empty-note">Keine entfernten Seiten</p>'}
        </div>
      </div>
    </div>`

    const changesSection = d.pageChanges.length ? `<div class="section"><h2>Seiten-Änderungen</h2>
      <table>
        <thead><tr><th>URL</th><th>Ladezeit</th><th>JS-Fehler</th></tr></thead>
        <tbody>${d.pageChanges.map(c => `<tr>
          <td>${esc(c.url)}</td>
          <td class="${changeCls(c.loadTimeChange)}">${sign(c.loadTimeChange)} ms</td>
          <td class="${changeCls(c.jsErrorsChange)}">${c.jsErrorsChange !== 0 ? sign(c.jsErrorsChange) : '–'}</td>
        </tr>`).join('')}</tbody>
      </table>
    </div>` : ''

    const footer = `<div class="report-footer">Erstellt mit Website Doctor &nbsp;·&nbsp; ${now}</div>`

    document.getElementById('content').innerHTML = header + scoreSection + weakSection + pagesSection + changesSection + footer
    document.title = `Website Doctor – Vergleich ${repA.siteTitle || repA.hostname || ''}`
  }

  load()
</script>
</body>
</html>
